name: Sync Kanka Map Data

on:
  push:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * *'   # daily at 6 AM UTC
  workflow_dispatch:        # "Run workflow" button in Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit and push

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build map data from Kanka
        env:
          KANKA_TOKEN: ${{ secrets.KANKA_TOKEN }}
        run: python scripts/build_locations.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/map_data.json data/road_graph.json data/roads_static.json
          git diff --staged --quiet || git commit -m "chore: sync Kanka map data [skip ci]"
          git push
